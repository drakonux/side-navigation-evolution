    /* ─────────────────────────────────────────────────────────
       RESET + BASE
    ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: var(--color-dark);
      background: #FFFFFF;
      overflow: hidden;
    }

    /* Force all icons to exactly 16 × 16 and always use currentColor */
    .lexicon-icon {
      width: 16px !important;
      height: 16px !important;
      flex-shrink: 0;
      fill: currentColor !important;
    }

    /* ─────────────────────────────────────────────────────────
       APP SHELL
    ───────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #body-row {
      flex: 1;
      position: relative; /* anchor for absolute children */
      overflow: hidden;
    }

    /* ─────────────────────────────────────────────────────────
       SIDEBAR BRAND HEADER
    ───────────────────────────────────────────────────────── */
    .sb-brand {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      flex-shrink: 0;
    }
    .sb-brand-logo {
      width: 24px; height: 24px;
      background: var(--color-primary);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: #fff;
    }
    .sb-brand-name {
      font-family: "Source Sans Pro Local", "Source Sans Pro", sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #272833; /* on #F1F2F5: ~15:1 ✓ */
      letter-spacing: -.01em;
      flex: 1;
    }
    .sb-menu-btn {
      width: 28px; height: 28px;
      border: none;
      background: none;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: #5A5B70;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .1s, color .1s;
    }
    .sb-menu-btn:hover { background: #E2E4EA; color: #272833; }


    /* ─────────────────────────────────────────────────────────
       SIDEBAR
       — 240px fixed, dark, accessible (all text ≥ 4.5:1 on #1C1C24)
    ───────────────────────────────────────────────────────── */
    /* Rail — no layout space, just anchor for absolutely positioned panel */
    #sidebar-rail {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0;
      overflow: visible;
      z-index: 1;
      pointer-events: none;
    }

    /* Panel — stays completely still, never animates */
    #sidebar {
      position: absolute;
      left: 8px;
      top: 8px;
      bottom: 8px;
      width: 280px;
      background: #F1F2F5;
      border: 1px solid #D3D6E0;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* footer is permanent DOM, inner scrolls */ /* scroll handled by .sb-scroll */
      pointer-events: auto;
      z-index: 1;
      /* no transition — panel is stationary */
    }


    /* Content — the "envelope", sits on top and slides over the panel */
    #content {
      position: absolute;
      left: 296px; /* 280px panel + 8px left + 8px gap */
      top: 0; right: 0; bottom: 0;
      overflow: hidden;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
      z-index: 2;
      transition: left .35s cubic-bezier(.4,0,.2,1);
    }

    /* Collapsed: content sweeps fully left, covering the panel */
    #body-row.panel-collapsed #content {
      left: 0;
    }

    /* Reopen — full-height invisible hover strip on the left edge */
    #sb-reopen {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 24px;
      background: transparent;
      border: none;
      padding: 0;
      cursor: e-resize;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: background .15s ease, opacity .15s ease;
    }
    #sb-reopen.visible {
      pointer-events: auto;
      opacity: 1;
      background: transparent;
    }
    #sb-reopen.visible:hover {
      background: linear-gradient(to right, rgba(11,95,255,.15) 0%, transparent 100%);
    }

    /* Panel title row */
    .sb-panel-title {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.07);
      flex-shrink: 0;
    }
    .sb-panel-icon {
      width: 24px; height: 24px;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: #fff;
    }
    .sb-panel-label {
      font-size: 13px;
      font-weight: 700;
      color: #E4E6F0; /* contrast on #1C1C24: ~12:1 ✓ */
      line-height: 1;
      flex: 1;
    }

    /* Back row */
    .sb-back {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      color: #5A5B70; /* on #F1F2F5: ~5.5:1 ✓ */
      cursor: pointer;
      border-bottom: 1px solid #D3D6E0;
      transition: background .1s, color .1s;
      flex-shrink: 0;
    }
    .sb-back:hover { background: #E2E4EA; color: #272833; }

    /* Site row (site switcher header) */
    .sb-site-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid #D3D6E0;
      cursor: pointer;
      transition: background .1s;
      flex-shrink: 0;
    }
    .sb-site-row:hover { background: #E2E4EA; }
    .sb-site-avatar {
      width: 28px; height: 28px;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .sb-site-name {
      font-size: 13px;
      font-weight: 600;
      color: #272833; /* ~15:1 ✓ */
      line-height: 1.2;
    }
    .sb-site-url {
      font-size: 11px;
      color: #5A5B70; /* ~5.5:1 ✓ */
      margin-top: 1px;
    }
    .sb-site-chevron { margin-left: auto; color: #5A5B70; }

    /* Nav section heading */
    .sb-section {
      flex-shrink: 0;
      padding: 16px 16px 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #5A5B70; /* on #F1F2F5: ~5.5:1 ✓ */
    }

    /* Nav divider */
    .sb-divider {
      flex-shrink: 0;
      height: 1px;
      background: #D3D6E0;
      margin: 4px 0;
    }

    /* Nav item */
    .sb-item {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 40px;
      flex-shrink: 0;
      padding: 0 16px;
      font-size: 13px;
      color: #272833; /* on #F1F2F5: ~15:1 ✓ */
      cursor: pointer;
      transition: background .1s, color .1s;
      position: relative;
      text-decoration: none;
      user-select: none;
    }
    .sb-item::before {
      content: '';
      position: absolute;
      left: 0; top: 4px; bottom: 4px;
      width: 0;
      border-radius: 0 2px 2px 0;
      transition: width .1s, background .1s;
    }
    .sb-item:hover {
      background: #E2E4EA;
      color: #272833;
    }
    .sb-item:hover::before { width: 2px; background: #A7A9BC; }
    .sb-item.is-active {
      background: #E8EEFF;
      color: #0053F0; /* on #E8EEFF: ~5.1:1 ✓ */
      font-weight: 600;
    }
    .sb-item.is-active::before { width: 3px; background: #0B5FFF; }
    .sb-item.is-disabled {
      cursor: default;
      pointer-events: none;
      /* #636575 on #F1F2F5: ~4.9:1 ✓ WCAG AA */
      color: #636575 !important;
    }
    .sb-item-icon {
      display: flex; align-items: center; justify-content: center;
      width: 16px; height: 16px;
      flex-shrink: 0;
      color: inherit;
    }
    .sb-item-label { flex: 1; line-height: 1; }
    .sb-item-arrow {
      display: flex;
      align-items: center;
      color: #0B5FFF;
      flex-shrink: 0;
      opacity: .7;
    }

    /* ─────────────────────────────────────────────────────────
       CONTENT AREA
    ───────────────────────────────────────────────────────── */
    #content {
      flex: 1;
      overflow-y: auto;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
    }

    /* Breadcrumb */
    .bc-bar {
      height: 40px;
      background: #fff;
      border-bottom: 1px solid var(--color-light-d1);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 6px;
      font-size: 13px;
      color: var(--color-secondary);
      flex-shrink: 0;
    }
    .bc-bar a {
      color: var(--color-primary);
      text-decoration: none;
      cursor: pointer;
      display: flex; align-items: center; gap: 4px;
    }
    .bc-bar a:hover { text-decoration: underline; }
    .bc-sep { color: var(--color-secondary-l1); font-size: 12px; }
    .bc-current { color: var(--color-dark); font-weight: 500; }

    /* Page header */
    .page-header {
      background: #fff;
      border-bottom: 1px solid var(--color-light-d1);
      padding: 20px 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }
    .page-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-dark);
      line-height: 1.2;
    }
    .page-header .subtitle {
      font-size: 13px;
      color: var(--color-secondary);
      margin-top: 3px;
    }
    .page-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    /* Management bar */
    .mgmt-bar {
      height: 48px;
      background: #fff;
      border-bottom: 1px solid var(--color-light-d1);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      flex-shrink: 0;
    }
    .mgmt-search {
      position: relative;
      width: 280px;
    }
    .mgmt-search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--color-secondary);
      display: flex;
    }
    .mgmt-search input {
      width: 100%;
      height: 32px;
      padding: 0 12px 0 32px;
      border: 1px solid var(--color-light-d1);
      border-radius: 99px;
      font-size: 13px;
      color: var(--color-dark);
      background: #FFFFFF;
      outline: none;
      transition: border-color .1s, background .1s;
    }
    .mgmt-search input:focus {
      border-color: var(--color-primary);
      background: #fff;
      box-shadow: 0 0 0 2px rgba(11,95,255,.15);
    }
    .mgmt-spacer { flex: 1; }
    .mgmt-count {
      font-size: 13px;
      color: var(--color-secondary);
    }

    /* Scrollable content body */
    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* ── Data table ── */
    .data-table {
      background: #fff;
      border: 1px solid var(--color-light-d1);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .dt-head {
      display: flex;
      align-items: center;
      height: 40px;
      padding: 0 16px;
      background: #FFFFFF;
      border-bottom: 1px solid var(--color-light-d1);
      gap: 8px;
    }
    .dt-head-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--color-secondary);
      flex: 1;
    }
    .dt-col-heads {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 0 16px;
      gap: 12px;
      border-bottom: 1px solid var(--color-light-d1);
      background: #FFFFFF;
    }
    .dt-col-head {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--color-secondary);
    }
    .dt-row {
      display: flex;
      align-items: center;
      height: 48px;
      padding: 0 16px;
      gap: 12px;
      border-bottom: 1px solid var(--color-light-d2);
      cursor: pointer;
      transition: background .1s;
    }
    .dt-row:last-child { border-bottom: none; }
    .dt-row:hover { background: #F4F5F7; }
    .dt-cell { font-size: 13px; color: var(--color-dark); }
    .dt-cell-muted { font-size: 13px; color: var(--color-secondary); }

    /* Site avatar in table */
    .site-dot {
      width: 28px; height: 28px;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }

    /* ── Status label ── */
    .lbl {
      display: inline-flex; align-items: center;
      padding: 2px 7px;
      font-size: 11px; font-weight: 600;
      border-radius: var(--rounded-full);
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .lbl-success  { background: transparent; border-color: var(--color-success);   color: var(--color-success); }
    .lbl-secondary{ background: transparent; border-color: var(--color-secondary-l1); color: var(--color-secondary); }
    .lbl-warning  { background: transparent; border-color: var(--color-warning);   color: var(--color-warning); }
    .lbl-info     { background: transparent; border-color: var(--color-info);      color: var(--color-info); }
    .lbl-info { background: var(--color-info-l2); border-color: var(--color-info-l1); color: var(--color-info-d1); }

    /* ── Stat strip (site admin) ── */
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--color-light-d1);
      border: 1px solid var(--color-light-d1);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
    }
    .stat-cell {
      background: #fff;
      padding: 16px 20px;
      cursor: pointer;
      transition: background .1s;
    }
    .stat-cell:hover { background: #F4F5F7; }
    .stat-cell.no-link { cursor: default; }
    .stat-cell.no-link:hover { background: #fff; }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--color-secondary);
    }

    /* ── Pages tree ── */
    .pages-tree {
      background: #fff;
      border: 1px solid var(--color-light-d1);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .pt-row {
      display: flex;
      align-items: center;
      height: 44px;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid var(--color-light-d2);
      cursor: pointer;
      transition: background .1s;
      font-size: 13px;
      color: var(--color-dark);
    }
    .pt-row:last-child { border-bottom: none; }
    .pt-row:hover { background: #F4F5F7; }
    .pt-row.pt-active {
      background: var(--color-info-l2);
      color: var(--color-info);
    }
    .pt-row.pt-child { padding-left: 44px; }
    .pt-row.pt-child-2 { padding-left: 68px; }
    .pt-row .pt-expand { color: var(--color-secondary); flex-shrink: 0; }
    .pt-row .pt-name { flex: 1; font-weight: 500; }
    .pt-row .pt-type { font-size: 12px; color: var(--color-secondary); width: 120px; flex-shrink: 0; }

    /* ── Blog list ── */
    .blog-list { display: flex; flex-direction: column; gap: 1px; }
    .blog-row {
      background: #fff;
      border: 1px solid var(--color-light-d1);
      border-radius: 0;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 20px;
      cursor: pointer;
      transition: background .1s;
    }
    .blog-list .blog-row:first-child { border-radius: 6px 6px 0 0; }
    .blog-list .blog-row:last-child { border-radius: 0 0 6px 6px; }
    .blog-list .blog-row:only-child { border-radius: 6px; }
    .blog-list .blog-row + .blog-row { margin-top: -1px; }
    .blog-row:hover { background: #F4F5F7; z-index: 1; position: relative; }
    .blog-row-body { flex: 1; min-width: 0; }
    .blog-row-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-dark);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .blog-row-excerpt {
      font-size: 13px;
      color: var(--color-secondary);
      line-height: 1.45;
      /* clamp to 2 lines */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .blog-row-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--color-secondary-l0);
    }
    .blog-row-side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
      min-width: 90px;
    }

    /* ── View fade-in ── */
    @keyframes enter-forward {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes enter-back {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes enter-lateral {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .view-forward  { animation: enter-forward  .25s ease both; }
    .view-back     { animation: enter-back      .25s ease both; }
    .view-lateral  { animation: enter-lateral   .25s ease both; }

    /* ── Action menu (kebab) ── */
    .btn-icon {
      width: 28px; height: 28px;
      border: none; background: none;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-secondary);
      cursor: pointer;
      transition: background .1s, color .1s;
    }
    .btn-icon:hover { background: var(--color-light-d1); color: var(--color-dark); }

    /* ── Sidebar panel transitions ─────────────────────────── */
    @keyframes sb-enter-right {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    @keyframes sb-enter-left {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }
    .sb-slide-forward { animation: sb-enter-right .25s ease-in-out both; }
    .sb-slide-back    { animation: sb-enter-left  .25s ease-in-out both; }


    #sb-inner {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    #sb-footer-fixed {
      flex-shrink: 0;
    }
    /* ── Sidebar scrollable body + sticky footer ─────────── */
    .sb-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: auto;
      scrollbar-color: #C4C6D0 transparent;
      display: flex;
      flex-direction: column;
    }
    .sb-scroll::-webkit-scrollbar { width: 6px; }
    .sb-scroll::-webkit-scrollbar-thumb { background: #C4C6D0; border-radius: 2px; }

    .sb-footer {
      flex-shrink: 0;
      border-top: 1px solid #D3D6E0;
    }
    .sb-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background .1s;
    }
    .sb-user:hover { background: #E2E4EA; }
    .sb-user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .sb-user-name {
      font-size: 13px;
      font-weight: 600;
      color: #272833;
      line-height: 1.2;
    }
    .sb-user-role {
      font-size: 11px;
      color: #5A5B70;
    }

    [data-theme="dark"] .sb-footer { border-top-color: #525361; }
    [data-theme="dark"] .sb-user:hover { background: #272833; }
    [data-theme="dark"] .sb-user-name { color: #F1F2F5; }
    [data-theme="dark"] .sb-user-role { color: #A2A2B9; }
    /* ═══════════════════════════════════════════════════════
       DARK MODE — Lexicon foundations (tokens-dark.css)
       Activate: <html data-theme="dark">
    ═══════════════════════════════════════════════════════ */
    [data-theme="dark"],
    [data-theme="dark"] body,
    [data-theme="dark"] #app,
    [data-theme="dark"] #body-row,
    [data-theme="dark"] #sb-inner,
    [data-theme="dark"] html { background: #111116 !important; color: #F1F2F5; }



    /* Sidebar */
    [data-theme="dark"] #sb-footer-fixed,
    [data-theme="dark"] #sb-inner { background: #272833 !important; }
    [data-theme="dark"] #sidebar {
      background: #272833 !important;
      border-color: #525361; /* --color-secondary-l2 dark: visible border on elevated surface */
    }
    [data-theme="dark"] .sb-brand {
      border-bottom-color: #525361;
    }
    [data-theme="dark"] .sb-brand-name { color: #F1F2F5; }
    [data-theme="dark"] .sb-menu-btn { color: #A2A2B9; }
    [data-theme="dark"] .sb-menu-btn:hover { background: #272833; color: #F1F2F5; }

    [data-theme="dark"] .sb-back {
      color: #A2A2B9;
      border-bottom-color: #525361;
    }
    [data-theme="dark"] .sb-back:hover { background: #30313F; color: #F1F2F5; }

    [data-theme="dark"] .sb-section { color: #636682; }
    [data-theme="dark"] .sb-divider { background: #525361; }

    [data-theme="dark"] .sb-item { color: #C4C6D8; }
    [data-theme="dark"] .sb-item:hover { background: rgba(255,255,255,.06); color: #F1F2F5; }
    [data-theme="dark"] .sb-item:hover::before { background: rgba(255,255,255,.2); }
    [data-theme="dark"] .sb-item.is-active {
      background: rgba(97,152,255,.16);
      color: #93BEFF;
    }
    [data-theme="dark"] .sb-item.is-active::before { background: #6198FF; }
    [data-theme="dark"] .sb-item.is-disabled { color: #636682 !important; }
    [data-theme="dark"] .sb-item-arrow { color: #6198FF; }

    /* Content area */
    [data-theme="dark"] #content { background: #111116 !important; }
    [data-theme="dark"] #sb-reopen {
      background: #1C1C24;
      border-color: #30313F;
    }

    /* Page header & mgmt bar */
    [data-theme="dark"] .page-header {
      background: #111116;
      border-bottom-color: #30313F;
    }
    [data-theme="dark"] .page-header h1 { color: #F1F2F5; }
    [data-theme="dark"] .page-header .subtitle { color: #A2A2B9; }
    [data-theme="dark"] .mgmt-bar {
      background: #111116;
      border-bottom-color: #30313F;
    }
    [data-theme="dark"] .mgmt-search input {
      background: #272833;
      border-color: #393A4A;
      color: #F1F2F5;
    }
    [data-theme="dark"] .mgmt-search input:focus {
      background: #272833;
      border-color: #6198FF;
    }
    [data-theme="dark"] .mgmt-search-icon { color: #A2A2B9; }
    [data-theme="dark"] .mgmt-count { color: #A2A2B9; }

    /* Tables */
    [data-theme="dark"] .data-table,
    [data-theme="dark"] .pages-tree,
    [data-theme="dark"] .proto-table {
      background: #111116;
      border-color: #30313F;
    }
    [data-theme="dark"] .dt-head,
    [data-theme="dark"] .dt-col-heads {
      background: #272833;
      border-bottom-color: #393A4A;
    }
    [data-theme="dark"] .dt-head-title,
    [data-theme="dark"] .dt-col-head { color: #A2A2B9; }
    [data-theme="dark"] .dt-row {
      border-bottom-color: #30313F;
      color: #F1F2F5;
    }
    [data-theme="dark"] .dt-row:hover { background: #272833; }
    [data-theme="dark"] .dt-cell { color: #F1F2F5; }
    [data-theme="dark"] .dt-cell-muted { color: #A2A2B9; }

    /* Stat strip */
    [data-theme="dark"] .stat-strip { background: #30313F; border-color: #30313F; }
    [data-theme="dark"] .stat-cell { background: #111116; }
    [data-theme="dark"] .stat-cell:hover { background: #272833; }
    [data-theme="dark"] .stat-label { color: #A2A2B9; }

    /* Pages tree */
    [data-theme="dark"] .pt-row {
      border-bottom-color: #30313F;
      color: #F1F2F5;
    }
    [data-theme="dark"] .pt-row:hover { background: #272833; }
    [data-theme="dark"] .pt-row.pt-active {
      background: rgba(46,90,172,.25);
      color: #7E9FDD;
    }
    [data-theme="dark"] .pt-expand { color: #636682; }
    [data-theme="dark"] .pt-type { color: #A2A2B9; }

    /* Blog list */
    [data-theme="dark"] .blog-row {
      background: #111116;
      border-color: #30313F;
    }
    [data-theme="dark"] .blog-row:hover { background: #272833; }
    [data-theme="dark"] .blog-row-title { color: #F1F2F5; }
    [data-theme="dark"] .blog-row-excerpt { color: #A2A2B9; }
    [data-theme="dark"] .blog-row-meta { color: #636682; }

    /* Labels */
    [data-theme="dark"] .lbl-success  { background: transparent; border-color: #3BB959; color: #3BB959; }
    [data-theme="dark"] .lbl-secondary { background: transparent; border-color: #636682; color: #A2A2B9; }
    [data-theme="dark"] .lbl-warning   { background: transparent; border-color: #FF7A14; color: #FF7A14; }

    /* Buttons */
    [data-theme="dark"] .btn-primary { background: #6198FF; }
    [data-theme="dark"] .btn-secondary {
      background: #272833;
      border-color: #393A4A;
      color: #F1F2F5;
    }
    [data-theme="dark"] .btn-secondary:hover { background: #30313F; }
    [data-theme="dark"] .btn-icon { color: #A2A2B9; }
    [data-theme="dark"] .btn-icon:hover { background: #30313F; color: #F1F2F5; }

    /* Site dot */
    [data-theme="dark"] .site-dot { opacity: .9; }
  </style>
</head>

<div id="app">

  <!-- state label (hidden, JS still updates it) -->
  <span id="state-label" style="display:none"></span>

  <!-- Body -->
  <div id="body-row">
    <div id="sidebar-rail">
      <aside id="sidebar">
      <div id="sb-inner"></div>
      <div class="sb-footer" id="sb-footer-fixed" style="margin-top:8px">
        <div class="sb-user">
          <div class="sb-user-avatar">JD</div>
          <div style="flex:1;min-width:0">
            <div class="sb-user-name">Jon Doe</div>
            <div class="sb-user-role">Administrator</div>
          </div>
        </div>
      </div>
    </aside>
    </div>
    <button id="sb-reopen" onclick="toggleSidebar()" title="Open panel"></button>
    <main id="content"></main>
  </div>
</div>

<script>
/* ── State ─────────────────────────────────────────────── */
const S = { DASH: 'dash', SITE: 'site', PAGES: 'pages', BLOGS: 'blogs', COMMERCE: 'commerce', APPS: 'apps', IAHUB: 'iahub', CMS: 'cms' };
let current = S.DASH;
const hist = [];

const depth = { dash: 0, site: 1, pages: 2, blogs: 2, commerce: 1, apps: 1, iahub: 1, cms: 1 };
let navDir = 'forward';

function go(to) {
  if (to === current) return;
  const from = current;
  navDir = depth[to] > depth[from] ? 'forward'
         : depth[to] < depth[from] ? 'back'
         : 'lateral';
  hist.push(from);
  current = to;
  render();
  document.getElementById('content').scrollTop = 0;
}

/* ── Icon helper ────────────────────────────────────────── */
const ic = id =>
  `<svg class="lexicon-icon" aria-hidden="true"><use href="#${id}"/></svg>`;

/* ── Sidebar item builder ───────────────────────────────── */
function sbItem({ label, icon, img = null, active = false, nav = null, disabled = false, ghost = false, arrow = false, shortcut = false }) {
  const cls = ['sb-item', active ? 'is-active' : '', disabled ? 'is-disabled' : ''].filter(Boolean).join(' ');
  const ghostAttr = ghost ? 'style="pointer-events:none;cursor:default"' : '';
  const onclick = nav ? `onclick="go('${nav}')"` : '';
  const iconEl = img
    ? `<span class="sb-item-icon">${productIcon(img, 16, '3px')}</span>`
    : `<span class="sb-item-icon">${ic(icon)}</span>`;
  return `
    <div class="${cls}" ${onclick} role="${nav ? 'button' : 'menuitem'}" tabindex="${nav ? 0 : -1}" ${ghostAttr}>
      ${iconEl}
      <span class="sb-item-label" style="display:flex;align-items:center;gap:0;min-width:0">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</span>
        ${shortcut ? `<svg aria-hidden="true" style="width:12px;height:12px;fill:currentColor;flex-shrink:0;margin-left:8px;opacity:.55"><use href="#i-shortcut"/></svg>` : ''}
      </span>
      ${arrow ? `<span class="sb-item-arrow">${ic('i-angle-right')}</span>` : ''}
    </div>`;
}

const sbFooter = () => `
  <div class="sb-footer">
    <div class="sb-user">
      <div class="sb-user-avatar">JD</div>
      <div>
        <div class="sb-user-name">Jon Doe</div>
        <div class="sb-user-role">Administrator</div>
      </div>
      ${ic('i-ellipsis-v')}
    </div>
  </div>`;
const sbSection = t => `<div class="sb-section">${t}</div>`;
const sbDivider = () => `<div class="sb-divider"></div>`;

const siteImgCustom = (url, sz, r) => {
  const radius = r || '4px';
  return '<div style="'
    + `width:${sz}px;height:${sz}px;`
    + `border-radius:${radius};`
    + `background-image:url(${url});`
    + 'background-size:cover;'
    + 'background-position:center;'
    + 'background-repeat:no-repeat;'
    + 'flex-shrink:0"'
    + '></div>';
};

const productIcon = (url, sz, r) => {
  const radius = r || '4px';
  return '<div style="'
    + `width:${sz}px;height:${sz}px;`
    + `border-radius:${radius};`
    + `background-image:url(${url});`
    + 'background-size:contain;'
    + 'background-position:center;'
    + 'background-repeat:no-repeat;'
    + 'flex-shrink:0"'
    + '></div>';
};

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
const labels = { dash: 'Dashboard', site: 'Music Site', pages: 'Pages', blogs: 'Blogs', commerce: 'Commerce', apps: 'Applications', iahub: 'IA Hub', cms: 'Content Management' };

function render() {
  const sb = document.getElementById('sb-inner');
  const ct = document.getElementById('content');
  const lbl = document.getElementById('state-label');

  // sidebar animates only when switching between panel types (dash ↔ site)
  const prevSidebarType = hist.length ? (hist[hist.length-1] === S.DASH ? 'dash' : 'site') : null;
  const currSidebarType = current === S.DASH ? 'dash' : (current === S.COMMERCE || current === S.APPS) ? current : 'site';
  const sbAnimate = prevSidebarType && prevSidebarType !== currSidebarType;
  const sbClass = sbAnimate ? (navDir === 'back' ? 'sb-slide-back' : 'sb-slide-forward') : '';
  let sbContent = '';
  switch (current) {
    case S.DASH:     sbContent = sidebarDash();        break;
    case S.SITE:     sbContent = sidebarSite(null);    break;
    case S.PAGES:    sbContent = sidebarSite('pages'); break;
    case S.BLOGS:    sbContent = sidebarSite('blogs'); break;
    case S.COMMERCE: sbContent = sidebarCommerce();     break;
    case S.APPS:     sbContent = sidebarApps();         break;
    case S.IAHUB:    sbContent = sidebarIAHub();       break;
    case S.CMS:      sbContent = sidebarCMS();          break;
  }
  sb.innerHTML = sbClass
    ? `<div class="${sbClass}" style="display:flex;flex-direction:column;flex:1;min-height:0">${sbContent}</div>`
    : sbContent;

  let html = '';
  switch (current) {
    case S.DASH:     html = viewDash();     break;
    case S.SITE:     html = viewSite();     break;
    case S.PAGES:    html = viewPages();    break;
    case S.BLOGS:    html = viewBlogs();    break;
    case S.COMMERCE: html = viewCommerce(); break;
    case S.APPS:     html = viewApps();     break;
    case S.IAHUB:    html = viewIAHub();    break;
    case S.CMS:      html = viewCMS();      break;
  }
  ct.innerHTML = `<div class="view-${navDir}">${html}</div>`;
  lbl.textContent = labels[current];
  applyThemeIcons();
}

/* ── Sidebar toggle ─────────────────────────────────────── */
/* ── Theme toggle ─────────────────────────────────────── */
let isDark = false;

function applyThemeIcons() {
  const href = isDark ? '#i-sun' : '#i-moon';
  ['theme-use-dash','theme-use-site'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.setAttribute('href', href);
  });
}

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  applyThemeIcons();
}

function toggleSidebar() {
  const bodyRow = document.getElementById('body-row');
  const reopen  = document.getElementById('sb-reopen');
  const isCollapsed = bodyRow.classList.toggle('panel-collapsed');
  reopen.classList.toggle('visible', isCollapsed);
}

render();
</script>
